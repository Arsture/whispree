name: Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Determine version
        id: version
        run: |
          # Check for "GO LIVE X.X.X" pattern in commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" =~ GO\ LIVE\ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            NEW_VERSION="${BASH_REMATCH[1]}"
            echo "✨ Manual version from commit message: $NEW_VERSION"
          else
            # Find highest semantic version tag (not ancestor-based)
            LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
            LATEST_TAG="${LATEST_TAG:-v0.0.0}"
            CURRENT_VERSION="${LATEST_TAG#v}"
            echo "Current version (from tag $LATEST_TAG): $CURRENT_VERSION"

            IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
            MAJOR="${VERSION_PARTS[0]:-0}"
            MINOR="${VERSION_PARTS[1]:-0}"
            PATCH="${VERSION_PARTS[2]:-0}"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "🔢 Auto-incremented patch version: $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Set version in Info.plist (build only, not committed)
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" Whispree/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Whispree/Resources/Info.plist

      - name: Install signing certificate
        env:
          SIGNING_CERTIFICATE_P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$SIGNING_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build app
        run: |
          xcodebuild -project Whispree.xcodeproj \
            -scheme Whispree \
            -destination 'platform=macOS,arch=arm64' \
            -configuration Release \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find built app
        id: find_app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData/Whispree-*/Build/Products/Release -name 'Whispree.app' -maxdepth 1 | head -1)
          echo "App path: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Code sign app bundle
        run: |
          codesign --force --deep --sign "Whispree Signing" "${{ steps.find_app.outputs.app_path }}"
          codesign --verify --deep --strict "${{ steps.find_app.outputs.app_path }}"
          echo "Signing identity:"
          codesign -dvv "${{ steps.find_app.outputs.app_path }}" 2>&1 | grep -E "Authority|TeamIdentifier|Signature"

      - name: Create ZIP archive
        run: |
          cd "$(dirname "${{ steps.find_app.outputs.app_path }}")"
          ditto -c -k --sequesterRsrc --keepParent Whispree.app Whispree.zip
          mv Whispree.zip $GITHUB_WORKSPACE/

      - name: Create DMG
        run: |
          cd "$(dirname "${{ steps.find_app.outputs.app_path }}")"
          hdiutil create -volname Whispree -srcfolder Whispree.app -ov -format UDZO $GITHUB_WORKSPACE/Whispree.dmg

      - name: Sign update with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -L -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.6.0/Sparkle-2.6.0.tar.xz
          tar -xf sparkle.tar.xz

          # Sign the ZIP and capture signature + length
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | ./bin/sign_update Whispree.zip -f -)
          echo "Signature output: $SIGN_OUTPUT"

          # Parse sparkle:edSignature and length
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          echo "ed_signature=$ED_SIGNATURE" >> $GITHUB_OUTPUT
          echo "length=$LENGTH" >> $GITHUB_OUTPUT
        id: sign

      - name: Generate appcast.xml
        run: |
          mkdir -p appcast
          PUBDATE=$(date -R)
          cat > appcast/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Whispree</title>
              <link>https://github.com/Arsture/whispree/releases</link>
              <description>Most recent updates to Whispree</description>
              <language>en</language>
              <item>
                <title>Version ${{ steps.version.outputs.version }}</title>
                <sparkle:version>${{ steps.version.outputs.version }}</sparkle:version>
                <sparkle:shortVersionString>${{ steps.version.outputs.version }}</sparkle:shortVersionString>
                <pubDate>${PUBDATE}</pubDate>
                <enclosure url="https://github.com/Arsture/whispree/releases/download/v${{ steps.version.outputs.version }}/Whispree.zip"
                           sparkle:version="${{ steps.version.outputs.version }}"
                           sparkle:edSignature="${{ steps.sign.outputs.ed_signature }}"
                           length="${{ steps.sign.outputs.length }}"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Whispree v${{ steps.version.outputs.version }}
          files: |
            Whispree.zip
            Whispree.dmg
          draft: false
          prerelease: false

      - name: Deploy appcast to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appcast

      - name: Update Homebrew tap
        run: |
          SHA256=$(shasum -a 256 Whispree.zip | awk '{print $1}')
          VERSION=${{ steps.version.outputs.version }}

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Arsture/homebrew-whispree.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/whispree.rb << CASK
          cask "whispree" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/Arsture/whispree/releases/download/v#{version}/Whispree.zip"
            name "Whispree"
            desc "macOS menu bar STT app — record speech, transcribe with WhisperKit, correct with LLM, paste"
            homepage "https://github.com/Arsture/whispree"

            depends_on macos: ">= :sonoma"
            depends_on arch: :arm64

            app "Whispree.app"

            postflight do
              system "xattr", "-cr", "#{appdir}/Whispree.app"
            end

            zap trash: [
              "~/Library/Preferences/com.whispree.app.plist",
            ]
          end
          CASK

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/whispree.rb
          git commit -m "chore: bump whispree to ${VERSION}" || exit 0
          git push
