name: FreeWhisper
options:
  bundleIdPrefix: com.freewhisper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.0.0"

targets:
  FreeWhisper:
    type: application
    platform: macOS
    sources:
      - path: FreeWhisper
        excludes:
          - "**/.DS_Store"
    resources:
      - path: FreeWhisper/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freewhisper.app
        PRODUCT_NAME: FreeWhisper
        INFOPLIST_FILE: FreeWhisper/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FreeWhisper/Resources/FreeWhisper.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies:
      - package: WhisperKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: KeyboardShortcuts
      - package: LaunchAtLogin
    entitlements:
      path: FreeWhisper/Resources/FreeWhisper.entitlements

  FreeWhisperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FreeWhisperTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freewhisper.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FreeWhisper.app/Contents/MacOS/FreeWhisper"
    dependencies:
      - target: FreeWhisper
